<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="skylineTitle skylineDesc">
  <title id="skylineTitle">Houston skyline at dusk</title>
  <desc id="skylineDesc">Original stylized illustration of the Houston, Texas skyline in warm cream, terracotta, and deep forest green tones.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F1E5"/>
      <stop offset="55%" stop-color="#F0E4CE"/>
      <stop offset="100%" stop-color="#E8CFA8"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C55F3F" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#C55F3F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5142" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#2E5142" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F3A2E" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#163024" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="400" fill="url(#sky)"/>
  <!-- warm haze / sun -->
  <circle cx="620" cy="215" r="52" fill="#C55F3F" opacity="0.35"/>
  <circle cx="620" cy="215" r="30" fill="#C55F3F" opacity="0.55"/>
  <rect y="180" width="800" height="140" fill="url(#haze)"/>

  <!-- distant skyline layer -->
  <g fill="url(#dist)" opacity="0.85">
    <rect x="20"  y="245" width="18" height="70"/>
    <rect x="46"  y="230" width="14" height="85"/>
    <rect x="66"  y="255" width="22" height="60"/>
    <rect x="95"  y="240" width="12" height="75"/>
    <rect x="115" y="260" width="18" height="55"/>
    <rect x="140" y="245" width="14" height="70"/>
    <rect x="162" y="235" width="18" height="80"/>
    <rect x="188" y="255" width="14" height="60"/>
    <rect x="208" y="245" width="20" height="70"/>
    <rect x="234" y="230" width="16" height="85"/>
    <rect x="256" y="248" width="14" height="67"/>
    <rect x="276" y="255" width="18" height="60"/>
    <rect x="300" y="240" width="14" height="75"/>
    <rect x="320" y="230" width="20" height="85"/>
    <rect x="346" y="252" width="14" height="63"/>
    <rect x="366" y="248" width="18" height="67"/>
    <rect x="390" y="242" width="12" height="73"/>
    <rect x="410" y="235" width="18" height="80"/>
    <rect x="434" y="255" width="16" height="60"/>
    <rect x="456" y="248" width="14" height="67"/>
    <rect x="476" y="240" width="18" height="75"/>
    <rect x="500" y="228" width="20" height="87"/>
    <rect x="526" y="248" width="16" height="67"/>
    <rect x="546" y="255" width="14" height="60"/>
    <rect x="566" y="240" width="18" height="75"/>
    <rect x="590" y="232" width="14" height="83"/>
    <rect x="608" y="255" width="18" height="60"/>
    <rect x="630" y="245" width="14" height="70"/>
    <rect x="650" y="230" width="20" height="85"/>
    <rect x="676" y="250" width="14" height="65"/>
    <rect x="696" y="240" width="18" height="75"/>
    <rect x="720" y="252" width="14" height="63"/>
    <rect x="740" y="245" width="18" height="70"/>
    <rect x="764" y="255" width="16" height="60"/>
  </g>

  <!-- foreground iconic silhouettes -->
  <g fill="url(#mid)">
    <!-- JPMorgan Chase Tower silhouette (stepped) -->
    <path d="M 258 315 L 258 205 L 268 200 L 268 180 L 274 174 L 280 180 L 280 200 L 290 205 L 290 315 Z"/>
    <!-- Wells Fargo Plaza silhouette (twin trapezoid) -->
    <path d="M 316 315 L 316 200 L 322 195 L 322 175 L 342 175 L 342 195 L 348 200 L 348 315 Z"/>
    <!-- Williams Tower with beacon -->
    <path d="M 372 315 L 372 210 L 388 190 L 404 210 L 404 315 Z"/>
    <rect x="386" y="164" width="4" height="26"/>
    <circle cx="388" cy="162" r="4"/>
    <!-- Bank of America Center -->
    <path d="M 424 315 L 424 220 L 430 214 L 430 198 L 436 192 L 448 192 L 454 198 L 454 214 L 460 220 L 460 315 Z"/>
    <!-- One Shell Plaza -->
    <rect x="482" y="210" width="20" height="105"/>
    <rect x="486" y="196" width="12" height="18"/>
    <!-- Heritage Plaza (stepped top) -->
    <path d="M 522 315 L 522 220 L 528 214 L 528 200 L 534 194 L 538 194 L 544 200 L 544 214 L 550 220 L 550 315 Z"/>
    <!-- 609 Main -->
    <rect x="572" y="215" width="18" height="100"/>
    <path d="M 572 215 L 590 208 L 590 215 Z"/>
  </g>

  <!-- ground line / bayou -->
  <rect y="315" width="800" height="85" fill="#163024"/>
  <path d="M 0 320 Q 200 340 400 322 T 800 328 L 800 400 L 0 400 Z" fill="#0F241A"/>

  <!-- warm window pinpricks -->
  <g fill="#F7F1E5" opacity="0.55">
    <circle cx="270" cy="235" r="1"/><circle cx="278" cy="248" r="1"/><circle cx="270" cy="262" r="1"/>
    <circle cx="325" cy="220" r="1"/><circle cx="335" cy="238" r="1"/><circle cx="325" cy="252" r="1"/>
    <circle cx="388" cy="230" r="1"/><circle cx="388" cy="252" r="1"/><circle cx="388" cy="275" r="1"/>
    <circle cx="435" cy="228" r="1"/><circle cx="447" cy="238" r="1"/><circle cx="435" cy="260" r="1"/>
    <circle cx="490" cy="228" r="1"/><circle cx="490" cy="255" r="1"/><circle cx="490" cy="285" r="1"/>
    <circle cx="533" cy="240" r="1"/><circle cx="533" cy="270" r="1"/>
    <circle cx="580" cy="235" r="1"/><circle cx="580" cy="265" r="1"/><circle cx="580" cy="295" r="1"/>
  </g>
</svg>
